services:
  web:
    image: python:3.12-slim
    container_name: fifa26-simulator
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    command: sh -c "pip install -r requirements.txt && streamlit run app.py --server.port=8501 --server.address=0.0.0.0 --server.enableCORS=false --server.enableXsrfProtection=false --server.enableWebsocketCompression=false"


